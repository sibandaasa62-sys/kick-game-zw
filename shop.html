<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kickgame Shop</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial,sans-serif;
}

body{
  background:#0b0f14;
  color:#fff;
  overflow-x:hidden;
}

body::before{
  content:"";
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:radial-gradient(circle at top,#111827,#070a0f 60%,#05070a);
  z-index:-1;
}

/* NAV */
nav{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:20px 50px;
  background:rgba(10,15,20,0.7);
  backdrop-filter:blur(10px);
  border-bottom:1px solid #1b2633;
}

.logo{ height:40px; }

nav a{
  color:#cfd6dd;
  text-decoration:none;
  margin-left:25px;
}

nav a:hover{ color:#8fb4d9; }

/* TITLE */
.title{ padding:50px; }
.title h1{ font-size:42px; }
.title p{ color:#8c98a5; }

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(240px,240px));
  justify-content:center;
  gap:28px;
  padding:20px 40px 140px;
}

/* CARD */
.card{
  background:#111821;
  border-radius:18px;
  overflow:hidden;
  border:1px solid #1f2c3a;
}

.card img{
  width:100%;
  height:190px;
  object-fit:contain;
  background:#0f141b;
  padding:12px;
}

.info{ padding:16px; }

.price{ color:#8fb4d9; margin-bottom:10px; }

.size-select{
  width:100%;
  padding:10px;
  margin-bottom:10px;
  background:#0f141b;
  color:white;
  border:none;
  border-radius:10px;
}

/* INPUT */
.qty-row{ display:flex; gap:10px; }

.quantity-input{
  width:75px;
  padding:10px;
  background:#0f141b;
  border:none;
  border-radius:10px;
  color:white;
  text-align:center;
}

/* BUTTONS */
.add-btn{
  flex:1;
  border:none;
  border-radius:10px;
  background:#8fb4d9;
  cursor:pointer;
}

.remove-btn{
  width:100%;
  margin-top:10px;
  padding:10px;
  border:none;
  border-radius:10px;
  background:#1d2835;
  color:white;
}

/* CART */
.cart{
  position:fixed;
  bottom:20px;
  right:20px;
  width:320px;
  background:#111821;
  border-radius:18px;
  padding:18px;
}

.cart-items{
  max-height:180px;
  overflow:auto;
  margin-bottom:15px;
}

.total{ color:#8fb4d9; margin-bottom:15px; }

.checkout-btn{
  width:100%;
  padding:12px;
  background:#25D366;
  border:none;
  border-radius:12px;
  color:white;
}

/* CHECKOUT */
.overlay{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.75);
  justify-content:center;
  align-items:center;
}

.checkout-box{
  width:90%;
  max-width:430px;
  background:#111821;
  padding:25px;
  border-radius:20px;
}

.checkout-box input{
  width:100%;
  padding:12px;
  margin-bottom:12px;
  background:#0f141b;
  border:none;
  color:white;
  border-radius:10px;
}

.place-btn{
  width:100%;
  padding:12px;
  background:#25D366;
  border:none;
  border-radius:12px;
}

.close-btn{
  width:100%;
  padding:12px;
  background:#1c2733;
  border:none;
  border-radius:12px;
  margin-top:10px;
}
</style>
</head>

<body>

<nav>
<img src="/logo.png" class="logo">
<div>
<a href="index.html">Home</a>
<a href="#">Shop</a>
</div>
</nav>

<section class="title">
<h1>Shop Collection</h1>
<p>Curated sneakers & everyday essentials.</p>
</section>

<div class="grid" id="grid"></div>

<!-- CART -->
<div class="cart">
<h3>Cart</h3>
<div class="cart-items" id="cart-items">Cart is empty</div>
<div class="total">Total: $<span id="total">0</span></div>
<button class="checkout-btn" onclick="openCheckout()">Checkout</button>
</div>

<!-- CHECKOUT -->
<div class="overlay" id="checkout-overlay">
<div class="checkout-box">

<h2>Checkout</h2>

<input id="customer-name" placeholder="Full Name">
<input id="customer-phone" placeholder="Phone Number">
<input id="customer-address" placeholder="Address to be delivered">

<button class="place-btn" onclick="placeOrder()">Place Order</button>
<button class="close-btn" onclick="closeCheckout()">Cancel</button>

</div>
</div>

<script>

const products = [
{name:"New Balance 9060",price:25,image:"/images/nb9060.jpg"},
{name:"Adidas Samba",price:20,image:"/images/samba.jpg"},
{name:"Puma Suede",price:25,image:"/images/puma_suede.jpg"},
{name:"New Balance 530",price:20,image:"/images/nb530.jpg"},
{name:"Nike TN",price:30,image:"/images/tn.jpg"},
{name:"Asics",price:60,image:"/images/asics.jpg"},
{name:"Nike Mind 001",price:60,image:"/images/nike_mind_001.jpg"}
];

let cart = {};

const grid = document.getElementById("grid");

products.forEach(p=>{
grid.innerHTML += `
<div class="card">
<img src="${p.image}">
<div class="info">

<h3>${p.name}</h3>
<p class="price">$${p.price}</p>

<select id="size-${p.name}" class="size-select">
<option value="">Select Size</option>
<option>UK 3</option><option>UK 4</option><option>UK 5</option>
<option>UK 6</option><option>UK 7</option><option>UK 8</option>
<option>UK 9</option><option>UK 10</option>
</select>

<div class="qty-row">
<input type="number" id="qty-${p.name}" value="1" class="quantity-input">
<button class="add-btn" onclick="addToCart('${p.name}',${p.price})">Add</button>
</div>

<button class="remove-btn" onclick="removeFromCart('${p.name}')">Remove</button>

</div>
</div>
`;
});

function addToCart(name,price){

const size = document.getElementById("size-"+name).value;
const qty = parseInt(document.getElementById("qty-"+name).value);

if(!size){ alert("Select size"); return; }

const key = name+" - "+size;

if(!cart[key]){
cart[key]={qty:0,price};
}

cart[key].qty += qty;

updateCart();
}

function removeFromCart(name){

for(let k in cart){
if(k.startsWith(name+" - ")){
delete cart[k];
break;
}
}

updateCart();
}

function updateCart(){

let total=0;
const box=document.getElementById("cart-items");
box.innerHTML="";

for(let k in cart){

let sub = cart[k].qty * cart[k].price;
total += sub;

box.innerHTML += `
<div>
${k}<br>
Qty: ${cart[k].qty}<br>
$${sub}
</div>
<hr>
`;
}

document.getElementById("total").innerText=total;

if(!Object.keys(cart).length){
box.innerHTML="Cart is empty";
}
}

function openCheckout(){
document.getElementById("checkout-overlay").style.display="flex";
}

function closeCheckout(){
document.getElementById("checkout-overlay").style.display="none";
}

function placeOrder(){

let name=document.getElementById("customer-name").value;
let phone=document.getElementById("customer-phone").value;
let address=document.getElementById("customer-address").value;

if(!name||!phone||!address){
alert("Fill all fields");
return;
}

let msg="Hie! I would like to place an order.\n\n";

let total=0;

for(let k in cart){
msg+=`${k} x${cart[k].qty}\n`;
total+=cart[k].qty*cart[k].price;
}

msg+=`\nTotal: $${total}`;

window.open(
"https://wa.me/263788200595?text="+encodeURIComponent(msg),
"_blank"
);

cart={};
updateCart();
closeCheckout();
}

</script>

</body>
</html>
