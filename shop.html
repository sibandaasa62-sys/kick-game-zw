<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kickgame Shop</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial,sans-serif;
}

body{
  background:#0b0f14;
  color:#e6e6e6;
  overflow-x:hidden;
}

body::before{
  content:"";
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:radial-gradient(circle at top,#111827,#070a0f 60%,#05070a);
  z-index:-1;
}

/* NAV */
nav{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:20px 50px;
  background:rgba(10,15,20,0.7);
  backdrop-filter:blur(8px);
  border-bottom:1px solid #111;
}

.logo{height:40px;}

nav a{
  color:#cfd6dd;
  text-decoration:none;
  margin-left:25px;
  font-size:14px;
}

/* TITLE */
.title{
  padding:50px 60px 20px;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(240px,240px));
  gap:28px;
  justify-content:center;
  padding:30px 50px 120px;
}

/* CARD */
.card{
  background:#111821;
  border:1px solid #1a2430;
  border-radius:18px;
  overflow:hidden;
}

/* IMG */
.card img{
  width:100%;
  height:190px;
  object-fit:contain;
  background:#0f141b;
  padding:12px;
}

/* INFO */
.info{padding:16px;}

.price{color:#8fb4d9;}

/* SIZE */
.size-select{
  width:100%;
  padding:10px;
  margin:10px 0;
  background:#0f141b;
  color:white;
}

/* QTY */
.quantity-controls{
  display:flex;
  align-items:center;
  gap:10px;
}

.quantity{
  flex:1;
  text-align:center;
}

/* BUTTON */
button{
  background:transparent;
  border:1px solid #6f93b7;
  color:#d7e7f5;
  border-radius:10px;
  cursor:pointer;
  padding:10px;
}

/* CART */
.cart-bar{
  position:fixed;
  bottom:20px;
  right:20px;
  width:300px;
  background:#111821;
  padding:18px;
  border-radius:16px;
}

.whatsapp-btn{
  width:100%;
  padding:12px;
  background:#25D366;
  color:white;
  border:none;
  margin-top:10px;
}

/* CHECKOUT MODAL */
#checkoutModal{
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.7);
  justify-content:center;
  align-items:center;
  z-index:9999;
}

.checkout-box{
  background:#111821;
  padding:20px;
  border-radius:15px;
  width:90%;
  max-width:400px;
}

.checkout-box input{
  width:100%;
  padding:10px;
  margin-bottom:10px;
}

</style>
</head>

<body>

<nav>
  <img src="logo.png" class="logo">
  <div>
    <a href="#">Home</a>
    <a href="#">Shop</a>
  </div>
</nav>

<div class="title">
  <h1>Shop Collection</h1>
</div>

<div class="grid">

  <div class="card">
    <img src="images/nb9060.jpg">
    <div class="info">
      <h3>New Balance 9060</h3>
      <p class="price">$25</p>

      <select id="size-New Balance 9060" class="size-select">
        <option value="">Select Size</option>
        <option>UK 6</option>
        <option>UK 7</option>
      </select>

      <div class="quantity-controls">
        <button onclick="removeFromCart('New Balance 9060')">-</button>
        <div class="quantity" id="qty-New Balance 9060">0</div>
        <button onclick="addToCart('New Balance 9060')">+</button>
      </div>
    </div>
  </div>

</div>

<!-- CART -->
<div class="cart-bar">

  <h4>Cart</h4>
  <div id="cart-items">Cart is empty</div>

  <p>Items: <span id="count">0</span></p>

  <button class="whatsapp-btn" onclick="openCheckout()">
    Checkout
  </button>

</div>

<!-- CHECKOUT -->
<div id="checkoutModal">
  <div class="checkout-box">

    <h3>Checkout</h3>

    <input id="custName" placeholder="Full Name">
    <input id="custPhone" placeholder="Phone">
    <input id="custAddress" placeholder="Address">

    <div id="orderSummary"></div>

    <button onclick="placeOrder()">Place Order</button>
    <button onclick="closeCheckout()">Cancel</button>

  </div>
</div>

<script>

let cart = {};

function addToCart(product){

  const size = document.getElementById("size-" + product).value;

  if(!size){
    alert("Select size");
    return;
  }

  const key = product + " - " + size;

  cart[key] = (cart[key] || 0) + 1;

  updateCart();
}

function removeFromCart(product){

  for(let item in cart){
    if(item.startsWith(product + " - ")){
      cart[item]--;
      if(cart[item] <= 0) delete cart[item];
      break;
    }
  }

  updateCart();
}

function updateCart(){

  let total = 0;
  let html = "";

  for(let item in cart){
    total += cart[item];
    html += `<div>${item} x${cart[item]}</div>`;
  }

  document.getElementById("cart-items").innerHTML =
    total ? html : "Cart is empty";

  document.getElementById("count").innerText = total;
}

/* CHECKOUT */
function openCheckout(){

  if(Object.keys(cart).length === 0){
    alert("Cart empty");
    return;
  }

  let summary = "";

  for(let item in cart){
    summary += item + " x" + cart[item] + "<br>";
  }

  document.getElementById("orderSummary").innerHTML = summary;

  document.getElementById("checkoutModal").style.display = "flex";
}

function closeCheckout(){
  document.getElementById("checkoutModal").style.display = "none";
}

function placeOrder(){

  const name = document.getElementById("custName").value;
  const phone = document.getElementById("custPhone").value;
  const address = document.getElementById("custAddress").value;

  if(!name || !phone || !address){
    alert("Fill all details");
    return;
  }

  let msg =
    "NEW ORDER%0A" +
    "Name: " + name + "%0A" +
    "Phone: " + phone + "%0A" +
    "Address: " + address + "%0A%0AItems:%0A";

  for(let item in cart){
    msg += item + " x" + cart[item] + "%0A";
  }

  window.open(
    "https://wa.me/2637XXXXXXXX?text=" + msg,
    "_blank"
  );

  cart = {};
  updateCart();
  closeCheckout();
}

</script>

</body>
</html>
