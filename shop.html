<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kickgame Shop</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial,sans-serif;
}

body{
  background:#0b0f14;
  color:#e6e6e6;
  overflow-x:hidden;
}

body::before{
  content:"";
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:radial-gradient(circle at top,#111827,#070a0f 60%,#05070a);
  z-index:-1;
}

/* NAVBAR */

nav{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:20px 50px;
  background:rgba(10,15,20,0.7);
  backdrop-filter:blur(8px);
  border-bottom:1px solid #111;
}

.logo{
  height:40px;
}

nav a{
  color:#cfd6dd;
  text-decoration:none;
  margin-left:25px;
  font-size:14px;
  transition:0.3s;
}

nav a:hover{
  color:#8fb4d9;
}

/* TITLE */

.title{
  padding:50px 60px 20px;
}

.title h1{
  font-size:42px;
  margin-bottom:10px;
}

.title p{
  color:#9aa7b3;
}

/* GRID */

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(240px,240px));
  gap:28px;
  justify-content:center;
  padding:30px 50px 120px;
}

/* CARD */

.card{
  background:#111821;
  border:1px solid #1a2430;
  border-radius:18px;
  overflow:hidden;
  transition:0.3s;
}

.card:hover{
  transform:translateY(-6px);
  border-color:#31465f;
}

/* IMAGE */

.card img{
  width:100%;
  height:190px;
  object-fit:contain;
  background:#0f141b;
  padding:12px;
  transition:0.3s;
}

.card:hover img{
  transform:scale(1.03);
}

/* INFO */

.info{
  padding:16px;
}

.info h3{
  font-size:16px;
  margin-bottom:8px;
}

.price{
  color:#8fb4d9;
  font-size:15px;
  margin-bottom:15px;
  transition:0.3s;
}

/* SIZE */

.size-select{
  width:100%;
  padding:10px;
  margin-bottom:15px;
  background:#0f141b;
  border:1px solid #223042;
  border-radius:10px;
  color:#d7e7f5;
  outline:none;
}

/* QUANTITY */

.quantity-controls{
  display:flex;
  align-items:center;
  gap:10px;
}

.quantity-controls button{
  width:45px;
  height:45px;
  font-size:18px;
}

.quantity{
  flex:1;
  text-align:center;
  font-size:16px;
  color:#d7e7f5;
}

/* BUTTON */

button{
  background:transparent;
  border:1px solid #6f93b7;
  color:#d7e7f5;
  border-radius:10px;
  cursor:pointer;
  transition:0.3s;
}

button:hover{
  background:#6f93b7;
  color:#0b0f14;
}

/* CART */

.cart-bar{
  position:fixed;
  bottom:20px;
  right:20px;
  width:300px;
  background:#111821;
  border:1px solid #223042;
  padding:18px;
  border-radius:16px;
  box-shadow:0 10px 30px rgba(0,0,0,0.4);
}

.cart-bar h4{
  margin-bottom:10px;
}

.cart-items{
  max-height:180px;
  overflow:auto;
  margin-bottom:15px;
  font-size:14px;
  color:#cfd6dd;
}

.cart-item{
  margin-bottom:10px;
  padding-bottom:10px;
  border-bottom:1px solid #1b2633;
}

.cart-count{
  color:#8fb4d9;
  margin-bottom:15px;
}

/* WHATSAPP */

.whatsapp-btn{
  width:100%;
  padding:12px;
  background:#25D366;
  border:none;
  color:white;
  font-weight:bold;
  border-radius:12px;
  cursor:pointer;
  transition:0.3s;
}

.whatsapp-btn:hover{
  transform:scale(1.03);
}

</style>
</head>

  </p>

  <button class="whatsapp-btn" onclick="checkoutWhatsApp()">
    Order on WhatsApp
  </button>

<script>

let cart = {};

/* ADD */

function addToCart(product){

  const sizeSelect =
    document.getElementById("size-" + product);

  const size = sizeSelect.value;

  if(size === ""){
    alert("Please select a size first.");
    return;
  }

  const key = product + " - " + size;

  if(!cart[key]){
    cart[key] = 1;
  } else {
    cart[key]++;
  }

  updateCart();

}

/* REMOVE */
/* NOW REMOVES EVEN WITHOUT SELECTING SIZE */

function removeFromCart(product){

  let found = false;

  for(let item in cart){

    if(item.startsWith(product + " - ")){

      cart[item]--;

      found = true;

      if(cart[item] <= 0){
        delete cart[item];
      }

      break;

    }

  }

  updateCart();

}

/* UPDATE */

function updateCart(){

  let total = 0;

  const cartItems =
    document.getElementById("cart-items");

  cartItems.innerHTML = "";

  /* RESET COUNTS */

  document.querySelectorAll(".quantity")
  .forEach(qty => {
    qty.innerText = 0;
  });

  let nb530Total = 0;

  for(let item in cart){

    total += cart[item];

    cartItems.innerHTML += `
      <div class="cart-item">
        ${item}<br>
        Quantity: ${cart[item]}
      </div>
    `;

    const product =
      item.split(" - ")[0];

    const qtyElement =
      document.getElementById("qty-" + product);

    if(qtyElement){

      let current =
        parseInt(qtyElement.innerText);

      qtyElement.innerText =
        current + cart[item];

    }

    if(product === "New Balance 530"){
      nb530Total += cart[item];
    }

  }

  if(total === 0){
    cartItems.innerHTML = "Cart is empty";
  }

  /* NB530 DISCOUNT */

  const nb530Price =
    document.getElementById("price-nb530");

  if(nb530Total >= 3){

    nb530Price.innerText = "$15";
    nb530Price.style.color = "#7fd48d";

  } else {

    nb530Price.innerText = "$20";
    nb530Price.style.color = "#8fb4d9";

  }

  document.getElementById("count").innerText =
    total;

}

/* WHATSAPP */

function checkoutWhatsApp(){

  if(Object.keys(cart).length === 0){
    alert("Your cart is empty.");
    return;
  }

  let message =
    "Hello Kickgame,%0A%0AI want to order:%0A%0A";

  for(let item in cart){

    message +=
      item + " x" + cart[item] + "%0A";

  }

  const phone =
    "2637XXXXXXXX";

  window.open(
    "https://wa.me/" + phone + "?text=" + message,
    "_blank"
  );

}

</script>
