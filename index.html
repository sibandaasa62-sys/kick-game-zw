<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kickgame</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial,sans-serif;
}

body{
  background:#0b0f14;
  color:#e6e6e6;
  overflow-x:hidden;
}

/* BACKGROUND */

body::before{
  content:"";
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:
  radial-gradient(circle at top,#111827,#070a0f 60%,#05070a);
  z-index:-1;
}

/* NAV */

nav{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:20px 50px;
  background:rgba(10,15,20,0.7);
  backdrop-filter:blur(8px);
  border-bottom:1px solid #111;
  position:sticky;
  top:0;
  z-index:1000;
}

.logo{
  height:40px;
}

nav a{
  color:#cfd6dd;
  text-decoration:none;
  margin-left:25px;
  font-size:14px;
  transition:0.3s;
}

nav a:hover{
  color:#8fb4d9;
}

/* HERO */

.hero{
  height:90vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  padding:0 20px;
}

.hero h1{
  font-size:72px;
  letter-spacing:4px;
  color:#dfe7ef;
}

.hero p{
  margin-top:18px;
  color:#9aa7b3;
  font-size:16px;
  letter-spacing:1px;
}

/* BUTTON */

.btn{
  margin-top:30px;
  padding:12px 28px;
  border:1px solid #6f93b7;
  background:transparent;
  color:#cfe3ff;
  cursor:pointer;
  transition:0.3s;
  border-radius:12px;
  letter-spacing:1px;
}

.btn:hover{
  background:#6f93b7;
  color:#0b0f14;
  transform:translateY(-2px);
}

</style>
</head>

<body>

<!-- NAV -->

<nav>

<img src="/logo.png" class="logo">

<div>
<a href="#">Home</a>
<a href="shop.html">Shop</a>
<a href="#">Drops</a>
<a href="#">Contact</a>
</div>

</nav>

<!-- HERO -->

<section class="hero">

<h1>KICKGAME</h1>

<p>Nation Wide Delivery</p>

<button
class="btn"
onclick="window.location.href='shop.html'"
>
Shop Collection
</button>

</section>

</body>
</html>
